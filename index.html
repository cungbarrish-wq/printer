<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងការបោះពុម្ព Epson (PWA)</title>
    
    <!-- Favicon និង Social Meta Tags -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/7812/7812078.png" type="image/png">
    <meta property="og:title" content="ប្រព័ន្ធគ្រប់គ្រងការបោះពុម្ព Epson (PWA)">
    <meta property="og:description" content="កម្មវិធីគ្រប់គ្រងការបោះពុម្ពឯកសារ មានមុខងារកែពណ៌ និងរៀបចំទំព័រ។">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/7812/7812078.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://cdn-icons-png.flaticon.com/512/7812/7812078.png">
    
    <!-- បញ្ចូល Font Khmer OS Battambang -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS សម្រាប់ការតុបតែង -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome សម្រាប់រូបតំណាង (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- បញ្ចូល PDF.js សម្រាប់អានឯកសារ PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // កំណត់ Worker របស់ PDF.js ដើម្បីឱ្យវាដំណើរការបានលឿន
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- កន្លែងផ្ទុក CSS ទំហំក្រដាសដែលអាចផ្លាស់ប្តូរបាន (Dynamic Page Size) -->
    <style id="dynamic-print-style">
        /* លំនាំដើមគឺ A4 និងបិទមិនឱ្យបង្ហាញ ថ្ងៃខែ ម៉ោង ឬ Link វេបសាយ (margin: 0) */
        @page { size: A4; margin: 0mm; }
    </style>

    <style>
        /* កំណត់ Font ខ្មែរជាគោល */
        body {
            font-family: 'Khmer OS Battambang', 'Battambang', sans-serif !important;
        }

        /* CSS សម្រាប់ការបង្ហាញនៅលើអេក្រង់ Preview */
        #print-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 24px;
            width: 100%;
            /* ប្រើប្រាស់ CSS Hardware Acceleration សម្រាប់ការកែពណ៌លឿន */
            transition: filter 0.1s ease-out; 
        }
        
        .preview-page {
            background-color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        
        .preview-page canvas {
            display: block;
            transition: all 0.2s ease;
        }

        /* តម្រឹមផ្ទៃខាងក្រោយ Preview */
        #canvas-wrapper {
            background-color: #f3f4f6;
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            /* អនុញ្ញាតឱ្យ Scroll ទាំងបញ្ឈរ និងផ្ដេក */
            overflow: auto;
        }

        /* CSS បន្ថែមសម្រាប់ការកំណត់ទម្រង់ពេលបោះពុម្ពពិតប្រាកដ (PRINT MODE) */
        @media print {
            body * {
                visibility: hidden;
            }
            #print-container, #print-container * {
                visibility: visible;
            }
            #print-container {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: block !important; 
                padding: 0 !important;
                gap: 0 !important;
                background: transparent !important;
            }
            
            .print-page {
                width: 100vw !important;
                height: 100vh !important; /* បង្ខំឱ្យ ១ទំព័រស្មើនឹង ១ទំហំក្រដាសពេញ */
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                page-break-after: always !important; 
                break-after: page !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .print-page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            .print-page canvas {
                max-width: 100% !important;
                max-height: 100% !important;
                object-fit: contain !important; 
                width: auto !important;
                height: auto !important;
            }
            
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- របារផ្នែកខាងលើ -->
    <header class="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center z-10 no-print">
        <div class="flex items-center gap-3">
            <img src="https://cdn-icons-png.flaticon.com/512/7812/7812078.png" alt="Print Logo" class="w-8 h-8 object-contain drop-shadow-md bg-white rounded-md p-1">
            <h1 class="text-xl font-bold">Epson Print Manager <span class="text-xs bg-blue-600 px-2 py-1 rounded ml-2">Pro</span></h1>
        </div>
        
        <div class="flex gap-4 text-sm">
            <div class="flex items-center gap-2 bg-blue-900 px-3 py-1 rounded border border-blue-700">
                <i class="fa-solid fa-droplet text-cyan-400"></i><span>C: 85%</span>
                <i class="fa-solid fa-droplet text-pink-500"></i><span>M: 60%</span>
                <i class="fa-solid fa-droplet text-yellow-400"></i><span>Y: 90%</span>
                <i class="fa-solid fa-droplet text-gray-900 drop-shadow-md"></i><span>K: 80%</span>
            </div>
            <div class="flex items-center gap-2 bg-green-700 px-3 py-1 rounded">
                <i class="fa-solid fa-circle-check"></i>
                <span>ម៉ាស៊ីនត្រៀមរួចរាល់</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- របារបញ្ជាផ្នែកខាងឆ្វេង (Sidebar) - បន្ថែម flex-shrink-0 ទីនេះ -->
        <aside class="w-80 flex-shrink-0 bg-white shadow-xl flex flex-col z-10 overflow-y-auto no-print">
            
            <div class="p-4 border-b border-gray-200">
                <h2 class="font-bold text-gray-700 mb-3"><i class="fa-solid fa-file-import mr-2"></i>១. ជ្រើសរើសឯកសារ</h2>
                <label for="file-upload" class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-blue-300 rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition relative">
                    <div class="flex flex-col items-center justify-center pt-3 pb-4">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-blue-500 mb-1"></i>
                        <p class="mb-1 text-sm text-gray-600"><span class="font-semibold">ជ្រើសរើសឯកសារ</span></p>
                        <p class="text-xs text-gray-500">គាំទ្រ: JPG, PNG, PDF គ្រប់ទំព័រ</p>
                    </div>
                    <input id="file-upload" type="file" accept="image/*, application/pdf" class="hidden" />
                </label>
            </div>

            <!-- កែតម្រូវពណ៌ -->
            <div class="p-4 border-b border-gray-200">
                <h2 class="font-bold text-gray-700 mb-3"><i class="fa-solid fa-sliders mr-2"></i>២. កែតម្រូវគុណភាពអក្សរ</h2>
                <div class="mb-3">
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-gray-700">កម្រិតភាពដិត (Contrast)</label>
                        <span id="contrast-val" class="text-sm text-blue-600 font-bold">100%</span>
                    </div>
                    <input type="range" id="contrast-slider" min="0" max="300" value="100" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="mb-3">
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-gray-700">ពន្លឺ (Brightness)</label>
                        <span id="brightness-val" class="text-sm text-blue-600 font-bold">100%</span>
                    </div>
                    <input type="range" id="brightness-slider" min="0" max="200" value="100" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex items-center">
                    <input id="grayscale-check" type="checkbox" value="" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                    <label for="grayscale-check" class="ml-2 text-sm font-medium text-gray-700">បំប្លែងទៅជាស-ខ្មៅ (Grayscale)</label>
                </div>
            </div>

            <!-- រៀបចំទំហំ -->
            <div class="p-4 border-b border-gray-200 bg-blue-50">
                <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-expand mr-2"></i>៣. ការរៀបចំទំហំទំព័រ</h2>
                <div class="mb-3">
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-gray-700">ទំហំឯកសារ (Size)</label>
                        <span id="scale-val" class="text-sm text-blue-700 font-bold">100%</span>
                    </div>
                    <input type="range" id="scale-slider" min="10" max="200" value="100" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="mb-2">
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-gray-700">ពង្រីកស៊ុមក្រដាស (Expand)</label>
                        <span id="page-expand-val" class="text-sm text-blue-700 font-bold">0%</span>
                    </div>
                    <input type="range" id="page-expand-slider" min="0" max="200" value="0" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <button id="reset-filters" class="mt-3 w-full text-sm text-gray-700 bg-white border border-gray-300 hover:bg-gray-100 py-1.5 rounded transition">កំណត់ត្រឡប់ដើម (Reset All)</button>
            </div>

            <!-- ការកំណត់ម៉ាស៊ីន (Hardware) -->
            <div class="p-4 flex-1">
                <h2 class="font-bold text-gray-700 mb-3"><i class="fa-solid fa-gear mr-2"></i>៤. ការកំណត់ម៉ាស៊ីន</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">ទំហំក្រដាស (Paper Size)</label>
                        <select id="paper-size-select" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 block w-full p-2">
                            <option value="A4" selected>A4 (ស្តង់ដារ)</option>
                            <option value="A3">A3 (ក្រដាសធំ)</option>
                            <option value="A5">A5</option>
                            <option value="Letter">Letter</option>
                            <option value="Legal">Legal</option>
                            <option value="auto">ស្វ័យប្រវត្តិ (Auto)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">ប្រភេទក្រដាស (Media)</label>
                        <select class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 block w-full p-2">
                            <option value="plain">ក្រដាសធម្មតា (Plain Paper)</option>
                            <option value="glossy" selected>ក្រដាសរលោង (Premium Glossy)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t border-gray-200">
                <button id="print-btn" class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-lg px-5 py-3 text-center transition shadow-md disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                    <i class="fa-solid fa-print mr-2"></i> បញ្ជាបោះពុម្ព (Print Now)
                </button>
            </div>
        </aside>

        <!-- ផ្ទាំងបង្ហាញរូបភាព (Preview Area) - បន្ថែម min-w-0 ទីនេះ -->
        <section class="flex-1 min-w-0 flex flex-col relative bg-gray-200">
            <div class="bg-white border-b border-gray-300 px-4 py-2 flex justify-between items-center shadow-sm z-10 no-print">
                <span class="font-semibold text-gray-700"><i class="fa-solid fa-eye text-blue-600 mr-2"></i>ការបង្ហាញជាមុនគ្រប់ទំព័រ (Live Preview)</span>
            </div>

            <!-- កន្លែងផ្ទុក (Scrollable wrapper) -->
            <div id="canvas-wrapper" class="flex-1 relative p-4">
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none">
                    <img src="https://cdn-icons-png.flaticon.com/512/7812/7812078.png" alt="Empty State" class="w-24 h-24 mb-4 opacity-40 grayscale drop-shadow-lg">
                    <p class="text-lg text-gray-500">មិនទាន់មានឯកសារ។ សូមជ្រើសរើសរូបភាព ឬ PDF។</p>
                </div>
                
                <!-- Container សម្រាប់ដាក់ទំព័រទាំងអស់ (Multi-page stack) -->
                <div id="print-container" class="hidden">
                     <!-- Canvas នីមួយៗនឹងត្រូវបានបង្កើតនៅទីនេះដោយ JavaScript -->
                </div>
            </div>
            
            <div id="toast" class="absolute bottom-5 right-5 flex items-center w-full max-w-xs p-4 space-x-3 text-gray-500 bg-white rounded-lg shadow-lg transform transition-transform translate-y-20 opacity-0 no-print z-50" role="alert">
                <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-blue-500 bg-blue-100 rounded-lg">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                </div>
                <div class="ml-3 text-sm font-normal" id="toast-message">កំពុងដំណើរការ...</div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileUpload = document.getElementById('file-upload');
            const printContainer = document.getElementById('print-container');
            const emptyState = document.getElementById('empty-state');
            const printBtn = document.getElementById('print-btn');
            
            // ឧបករណ៍
            const contrastSlider = document.getElementById('contrast-slider');
            const brightnessSlider = document.getElementById('brightness-slider');
            const grayscaleCheck = document.getElementById('grayscale-check');
            const scaleSlider = document.getElementById('scale-slider');
            const pageExpandSlider = document.getElementById('page-expand-slider');
            const paperSizeSelect = document.getElementById('paper-size-select');
            const dynamicPrintStyle = document.getElementById('dynamic-print-style');
            
            // UI Values
            const contrastVal = document.getElementById('contrast-val');
            const brightnessVal = document.getElementById('brightness-val');
            const scaleVal = document.getElementById('scale-val');
            const pageExpandVal = document.getElementById('page-expand-val');
            const resetBtn = document.getElementById('reset-filters');
            
            // ការផ្លាស់ប្តូរទំហំក្រដាស
            paperSizeSelect.addEventListener('change', (e) => {
                const size = e.target.value;
                if (size === 'auto') {
                    dynamicPrintStyle.innerHTML = `@page { margin: 0mm; }`;
                } else {
                    dynamicPrintStyle.innerHTML = `@page { size: ${size}; margin: 0mm; }`;
                }
            });

            // ពេលអាប់ឡូតឯកសារ
            fileUpload.addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                // ជម្រះទិន្នន័យចាស់
                printContainer.innerHTML = '';
                printBtn.setAttribute('disabled', 'true');
                
                // Reset Sliders
                contrastSlider.value = 100;
                brightnessSlider.value = 100;
                grayscaleCheck.checked = false;
                scaleSlider.value = 100;
                pageExpandSlider.value = 0;
                updateUINumbers();
                applyCSSFiltersAndScale();

                if (file.type === 'application/pdf') {
                    showToast("កំពុងអានឯកសារ PDF... សូមរង់ចាំ!", false, true, true);
                    
                    try {
                        const fileReader = new FileReader();
                        fileReader.onload = async function() {
                            const typedarray = new Uint8Array(this.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            const numPages = pdf.numPages;
                            
                            // *** ការកែប្រែសំខាន់: បន្ថយគុណភាព (Scale) ស្វ័យប្រវត្តិ បើ PDF មានទំព័រច្រើន ***
                            // ការពារកុំឱ្យពេញ RAM ដែលបណ្តាលឱ្យលោតផ្ទាំង Page Unresponsive
                            let renderScale = 2.0; 
                            if (numPages > 200) renderScale = 1.0;
                            else if (numPages > 50) renderScale = 1.2;

                            emptyState.classList.add('hidden');
                            printContainer.classList.remove('hidden');

                            for (let i = 1; i <= numPages; i++) {
                                // Update សារប្រាប់អ្នកប្រើប្រាស់
                                document.getElementById('toast-message').textContent = `កំពុងរៀបចំទំព័រទី ${i} នៃ ${numPages}...`;
                                
                                const page = await pdf.getPage(i);
                                const viewport = page.getViewport({ scale: renderScale }); 
                                
                                const pageWrapper = document.createElement('div');
                                pageWrapper.className = 'print-page preview-page';
                                
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                canvas.width = viewport.width;
                                canvas.height = viewport.height;
                                
                                // Render PDF ដោយផ្ទាល់ទៅ Canvas កុំព្យូទ័រ (មិនបាច់បំប្លែងទៅ Base64 ដែលស៊ី RAM ទេ)
                                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                                
                                // រក្សាទំហំដើមទុកសម្រាប់គណនាពេលពង្រីក-បង្រួម
                                canvas.dataset.origW = viewport.width;
                                canvas.dataset.origH = viewport.height;
                                
                                // កំណត់ទំហំ CSS ជាបណ្តោះអាសន្ន
                                canvas.style.width = viewport.width + 'px';
                                canvas.style.height = viewport.height + 'px';
                                pageWrapper.style.width = viewport.width + 'px';
                                pageWrapper.style.height = viewport.height + 'px';

                                pageWrapper.appendChild(canvas);
                                printContainer.appendChild(pageWrapper);
                                
                                // *** ការកែប្រែសំខាន់: ផ្តល់សិទ្ធិឱ្យ Browser សម្រាក (Yield Thread) ***
                                // ធ្វើបែបនេះ ទោះ PDF មាន 1000 ទំព័រក៏មិនលោតផ្ទាំងគាំងដែរ
                                if (i % 3 === 0) {
                                    await new Promise(resolve => setTimeout(resolve, 5));
                                }
                            }
                            
                            printBtn.removeAttribute('disabled');
                            applyCSSFiltersAndScale();
                            showToast(`បានផ្ទុកជោគជ័យចំនួន ${numPages} ទំព័រ!`, true);
                        };
                        fileReader.readAsArrayBuffer(file);
                        
                    } catch (error) {
                        console.error(error);
                        showToast("មានបញ្ហាក្នុងការអាន PDF។", false, false, false);
                    }
                } 
                else if (file.type.startsWith('image/')) {
                    showToast("កំពុងអានរូបភាព...", false, true, true);
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            emptyState.classList.add('hidden');
                            printContainer.classList.remove('hidden');

                            const pageWrapper = document.createElement('div');
                            pageWrapper.className = 'print-page preview-page';
                            
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);

                            canvas.dataset.origW = img.width;
                            canvas.dataset.origH = img.height;
                            
                            canvas.style.width = img.width + 'px';
                            canvas.style.height = img.height + 'px';
                            pageWrapper.style.width = img.width + 'px';
                            pageWrapper.style.height = img.height + 'px';

                            pageWrapper.appendChild(canvas);
                            printContainer.appendChild(pageWrapper);

                            printBtn.removeAttribute('disabled');
                            applyCSSFiltersAndScale();
                            showToast("បានផ្ទុករូបភាពជោគជ័យ!", true);
                        }
                        img.src = event.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            });

            // *** បច្ចេកវិទ្យាថ្មី: ប្រើប្រាស់ CSS Engine ដើម្បីកែពណ៌ និងទំហំ (លឿនខ្លាំង) ***
            function applyCSSFiltersAndScale() {
                const scale = scaleSlider.value / 100;
                const pageExpand = pageExpandSlider.value / 100;
                const contrast = contrastSlider.value;
                const brightness = brightnessSlider.value;
                const grayscale = grayscaleCheck.checked ? 100 : 0;

                // ១. កែពណ៌ (Color Filters) ប្រើ CSS លើ Container ទាំងមូលតែម្តង 
                // វានឹងស៊ីសង្វាក់ជាមួយ Browser Engine និងធ្វើការបានលឿនមែនទែន
                printContainer.style.filter = `contrast(${contrast}%) brightness(${brightness}%) grayscale(${grayscale}%)`;

                // ២. កែទំហំ និងស៊ុម
                const pages = printContainer.querySelectorAll('.print-page');
                pages.forEach(page => {
                    const canvas = page.querySelector('canvas');
                    if(canvas && canvas.dataset.origW) {
                        const origW = parseFloat(canvas.dataset.origW);
                        const origH = parseFloat(canvas.dataset.origH);

                        const imgW = origW * scale;
                        const imgH = origH * scale;
                        const extraWidth = imgW * pageExpand;
                        const extraHeight = imgH * pageExpand;

                        // ទំហំក្រដាស (ស៊ុមខាងក្រៅ) រីកធំ
                        page.style.width = `${imgW + extraWidth}px`;
                        page.style.height = `${imgH + extraHeight}px`;

                        // ទំហំរូបភាពនៅខាងក្នុង
                        canvas.style.width = `${imgW}px`;
                        canvas.style.height = `${imgH}px`;
                    }
                });

                updateUINumbers();
            }

            function updateUINumbers() {
                contrastVal.textContent = contrastSlider.value + '%';
                brightnessVal.textContent = brightnessSlider.value + '%';
                scaleVal.textContent = scaleSlider.value + '%';
                pageExpandVal.textContent = pageExpandSlider.value + '%';
            }

            // ស្តាប់ការផ្លាស់ប្តូរនៅលើ Slider ទាំងអស់
            contrastSlider.addEventListener('input', applyCSSFiltersAndScale);
            brightnessSlider.addEventListener('input', applyCSSFiltersAndScale);
            grayscaleCheck.addEventListener('change', applyCSSFiltersAndScale);
            scaleSlider.addEventListener('input', applyCSSFiltersAndScale);
            pageExpandSlider.addEventListener('input', applyCSSFiltersAndScale);

            // មុខងារ Reset
            resetBtn.addEventListener('click', () => {
                contrastSlider.value = 100;
                brightnessSlider.value = 100;
                grayscaleCheck.checked = false;
                scaleSlider.value = 100;
                pageExpandSlider.value = 0;
                applyCSSFiltersAndScale();
            });

            // Print Action
            printBtn.addEventListener('click', () => {
                const pages = printContainer.querySelectorAll('.print-page');
                if (pages.length === 0) return;
                
                showToast("កំពុងរៀបចំបញ្ជូនទៅម៉ាស៊ីនបោះពុម្ព...", false, true, true);
                
                const originalBtnText = printBtn.innerHTML;
                printBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> កំពុងដំណើរការ...';
                printBtn.setAttribute('disabled', 'true');
                
                setTimeout(() => {
                    window.print(); 
                    printBtn.innerHTML = originalBtnText;
                    printBtn.removeAttribute('disabled');
                    showToast("រួចរាល់!", true);
                }, 1000);
            });

            // Toast Logic
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            function showToast(message, isSuccess = false, keepOpen = false, isSpinner = false) {
                toastMessage.textContent = message;
                const iconContainer = toast.querySelector('div:first-child');
                
                iconContainer.className = `inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg ${isSuccess ? 'text-green-500 bg-green-100' : 'text-blue-500 bg-blue-100'}`;
                
                if (isSpinner) {
                    iconContainer.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                } else {
                    iconContainer.innerHTML = isSuccess ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-circle-info"></i>';
                }

                toast.classList.remove('translate-y-20', 'opacity-0');
                
                if (!keepOpen) {
                    setTimeout(() => {
                        toast.classList.add('translate-y-20', 'opacity-0');
                    }, 3000);
                }
            }
        });
    </script>
</body>
</html>
